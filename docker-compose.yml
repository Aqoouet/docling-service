# Official [Docling Serve](https://github.com/docling-project/docling-serve) image only — no local build.
# API is v1 (e.g. POST /v1/convert/source), not this repo’s POST /convert multipart shim.
services:
  docling-serve:
    image: ${DOCLING_SERVICE_IMAGE:-ghcr.io/docling-project/docling-serve-cpu:latest}
    ports:
      - "${HOST_PORT:-5001}:5001"
    restart: unless-stopped
